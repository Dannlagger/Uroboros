name: Deploy fresh home to GitHub Pages

on:
  push:
    branches:
      - fresh/home

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare deploy (manual gh-pages push)
        run: |
          echo 'Preparing manual gh-pages deploy'

      - name: Deploy to gh-pages (manual)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="https://github.com/${{ github.repository }}.git"
          SHA="${{ github.sha }}"
          echo "Repo: $REPO"
          echo "SHA: $SHA"

          # clone or create gh-pages branch
          if git ls-remote --heads $REPO gh-pages >/dev/null; then
            git clone --depth 1 --branch gh-pages $REPO gh-pages
            cd gh-pages
            git rm -rf . || true
          else
            mkdir gh-pages
            cd gh-pages
            git init
            git remote add origin $REPO
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # copy build output
          cp -r ../dist/* .
          git add --all
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore(deploy): deploy fresh/home $SHA"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:gh-pages --force
          fi
